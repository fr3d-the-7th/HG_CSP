<!DOCTYPE html>
<html lang ="en">
<head>
    <title>CSS styling with color</title>
    <meta charset= "UTF-8">
    <style>
        #comp{
            height: 150px;
            width: 150px;
            background-color: blue;
            border-color: orange;
            color: white;
            border-style: solid;
            
        }
        #Ana{
            height: 150px;
            width: 150px;
            background-color: red;
            border-color: yellow;
            color: orange;
            border-style: solid;
            
        }
        #tri{
            height: 150px;
            width: 150px;
            background-color: purple;
            border-color: green;
            color: orange;
            border-style: solid;
            
        }


    </style>
</head>
<body>
    <h1>CSS styling with color</h1>
    <div id= "comp">
    <p>Complementary</p>
    </div>
    <div id= "Ana">
    <p>Analogous</p>
    </div>

    <div id= "tri">
    <p>Triadic</p>
    </div>






</body>
</html>
