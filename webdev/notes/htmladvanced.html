<!DOCTYPE html>
<html lang ="en">
<head>
    <title>Notes on advanced HTML</title>
    <meta charset= "UTF-8">
        <!--embedded style, good practice, go inside the head tag -->
        <style>
            *{
                background-color: rgb(0, 255, 255);
            }
            p{
                background-color: rgba(255, 228, 196, 0.589);
                text-align: center;
            }
            #ordered{
                color: cornflowerblue;
            }
            .section-2{
                font-family: papyrus, fantasy;
                border: 3px solid whitesmoke;
            }
            .odd{
                color: orange;
                background-color: beige;
                color: #0B6623;
            }
            h1{
                font-size:50px;
            }
            img{
                width: 100px;
            }
        </style>

</head>
<body>
    <h1>Advanced HTML</h1>
    <!--inline style, it is bad syntax-->
    <div style="background-color: blueviolet; height:100px; width:100px;">this is in a div</div>
    <div id= "ordered">
    <p>This is how you make an ordered list</p>
    <ol>
        <li>bannana</li>
        <li>strawberry</li>
        <li>apple</li>
    </ol>
    </div>
    <div id= "unordered" class="section-2" >
    <ul style="list-style-type: circle;">
        <li>carrot</li>
        <li>tomato</li>
        <li>pea</li>
    </ul>
    </div>
    <a href="https://www.w3schools.com/" target="_blank">W3schools unordered lists</a>
    <img src="https://images.squarespace-cdn.com/content/v1/63c60d44c98af85334537583/644359f9-c213-4d77-bdb0-b78b7f8424f3/Mount_Timpanogos_at_sunset.jpg" alt="Mount Timpanogos" >
</body>



</html>
