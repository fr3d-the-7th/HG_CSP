<!DOCTYPE html>
<html lang ="en">
<head>
    <title>JavaScript Notes
    </title>
    <meta charset= "UTF-8">
    <style>
        img{
            display: none;
            width: 50%;
        }
    </style>


    <script>
        let count = 0
        let img_count = 0
        let imgs =["https://www.pcicenters.com/wp-content/uploads/crashing-out.jpg", "https://i.etsystatic.com/41462229/r/il/6a8df6/7368990859/il_fullxfull.7368990859_s8ze.jpg", "https://www.lifeinthefingerlakes.com/wp-content/uploads/2019/10/finger-lakes-sunset-690x394.jpg"]

        function change(){
            if(img_count >= imgs.length){
                img_count = 0
            }else{
                img_count += 1
            }
            document.getElementById("timp").src = imgs[img_count]
        }

        function color_change(){
            document.getElementById("shift").style.color = document.getElementById('selected-color').value
        }
        function add(){
            count += 1
            document.getElementById("number").innerHTML = count
        }
        function hover(id){
            document.getElementById(id).style.backgroundColor = "red"
            document.getElementById(id).style.color = "white"
        }
        function unhoover(id){
            document.getElementById(id).style.backgroundColor = "lightgrey"
            document.getElementById(id).style.color = "black"
        }

        function popup(){
            alert("this is about JavaScript")
        }

        function show(){
            if(document.getElementById("timp").style.display == "block"){
                document.getElementById("timp").style.display = "none"
        
            }else{

            document.getElementById("timp").style.display = "block"
            }
        }

//onclick onmounsedown onmouseup onmouseover onmouseout 
    </script>
</head>
<body>
    
    <h1 id="shift" onclick="popup()">JavaScript Notes</h1>
    <input type="color" id="selected-color"/>
    <button onclick="color_change()" onmouseover="hover('one')" onmouseout="unhover('one')" id="one">Click me</button>
<p id="number" onmouseover="show()">0</p>
    <button onclick="add()" mouseover="hover('two')"  onmouseout="unhover('two')" id="two">increase</button>

<br>




    <img id="timp" alt="timpangos" src="https://images.squarespace-cdn.com/content/v1/63c60d44c98af85334537583/644359f9-c213-4d77-bdb0-b78b7f8424f3/Mount_Timpanogos_at_sunset.jpg" onmouseover="change()" >
"


</body>



</html>
